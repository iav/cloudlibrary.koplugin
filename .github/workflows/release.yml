name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from _meta.lua
        id: meta
        run: |
          VERSION=$(grep -oP '(?<=version = ")[^"]+' _meta.lua | sed 's/^v//')
          if [[ -z "$VERSION" ]]; then
            echo "Error: could not extract version from _meta.lua" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is new
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        if: steps.version_check.outputs.skip == 'false'
        run: |
          mkdir -p dist
          zip -r dist/zen_ui.koplugin.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "dist/*" \
            -x "*.zip" \
            -x "_site/*" \
            -x "_stage/*" \
            -x "picture/*"

      - name: Build release notes
        if: steps.version_check.outputs.skip == 'false'
        run: |
          cd $GITHUB_WORKSPACE   # 回到工作区根目录
          VERSION="${{ steps.meta.outputs.version }}"
          python3 - "$VERSION" <<'PYEOF' > release_notes.md
          import re, sys
          version = sys.argv[1]
          with open("changelog.lua") as f:
              content = f.read()
          pattern = r'\["' + re.escape(version) + r'"\]\s*=\s*\{([^}]+)\}'
          m = re.search(pattern, content, re.DOTALL)
          if m:
              block = m.group(1)
              items = [a or b for a, b in re.findall(r'"([^"]+)"|\'([^\']+)\'', block)]
              print("## What's Changed\n")
              for item in items:
                  print(f"- {item}")
          else:
              print("## What's Changed\n\n_No changelog entries for this version._")
          PYEOF

      - name: Create release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          gh release create "$TAG" \
            dist/zen_ui.koplugin.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release_notes.md
