name: Release Beta

on:
  push:
    branches:
      - sync
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from _meta.lua
        id: meta
        run: |
          VERSION=$(grep -oP '(?<=version = ")[^"]+' _meta.lua | sed 's/^v//')
          if [[ -z "$VERSION" ]]; then
            echo "Error: could not extract version from _meta.lua" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve beta tag
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          META_VERSION="${{ steps.meta.outputs.version }}"
          BASE="${META_VERSION}"

          # Get the latest release tag (including pre-releases)
          LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName \
            --jq '.[0].tagName' 2>/dev/null | sed 's/^v//' | sed 's/-beta\.[0-9]*$//')

          if [[ -n "$LATEST" ]]; then
            LOWER=$(printf '%s\n%s' "$META_VERSION" "$LATEST" | sort -V | head -1)
            if [[ "$LOWER" == "$META_VERSION" && "$META_VERSION" != "$LATEST" ]]; then
              echo "Version $META_VERSION is lower than current release $LATEST. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          N=1
          while gh release view "v${BASE}-beta.${N}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; do
            N=$((N + 1))
          done
          BETA_TAG="v${BASE}-beta.${N}"
          BETA_VERSION="${META_VERSION}-beta.${N}"
          echo "tag=$BETA_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Stamp beta version in _meta.lua
        if: steps.version_check.outputs.skip == 'false'
        run: |
          BETA_VERSION="${{ steps.version_check.outputs.version }}"
          sed -i "s/version = \"[^\"]*\"/version = \"v${BETA_VERSION}\"/" _meta.lua

      - name: Build plugin zip
        if: steps.version_check.outputs.skip == 'false'
        run: |
          mkdir -p dist
          zip -r dist/zen_ui.koplugin.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "dist/*" \
            -x "*.zip" \
            -x "_site/*" \
            -x "_stage/*" \
            -x "picture/*"

      - name: Build release notes
        if: steps.version_check.outputs.skip == 'false'
        run: |
          cd $GITHUB_WORKSPACE   # 回到工作区根目录
          VERSION="${{ steps.meta.outputs.version }}"
          python3 - "$VERSION" <<'PYEOF' > release_notes.md
          import re, sys
          version = sys.argv[1]
          with open("changelog.lua") as f:
              content = f.read()
          pattern = r'\["' + re.escape(version) + r'"\]\s*=\s*\{([^}]+)\}'
          m = re.search(pattern, content, re.DOTALL)
          if m:
              block = m.group(1)
              items = [a or b for a, b in re.findall(r'"([^"]+)"|\'([^\']+)\'', block)]
              print("## What's Changed\n")
              for item in items:
                  print(f"- {item}")
          else:
              print("## What's Changed\n\n_No changelog entries for this version._")
          PYEOF

      - name: Create release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version_check.outputs.tag }}"
          gh release create "$TAG" \
            dist/zen_ui.koplugin.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release_notes.md \
            --prerelease \
            --target "${{ github.sha }}"
